<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <script src="http://d3js.org/d3.v7.min.js"></script>
    <script src="JavaScript/main.js"></script>
    <script src="JavaScript/image.js"></script>
    <script src="JavaScript/path.js"></script>
  </head>
  <body>
    <div>
      <form id="setting">
        <p>
          Координаты рисунка<br />
          x:
          <input type="number" id="cx" value="300" />
          <span class="anim-field" style="display: none">
            до <input type="number" id="cx2" value="550" />
          </span>
          <br />

          y:
          <input type="number" id="cy" value="300" />
          <span class="anim-field" style="display: none">
            до <input type="number" id="cy2" value="550" />
          </span>
        </p>
        <p style="display: none">
          Пути перемещения<br />

          <select id="trajectoryType" class="traj-field">
            <option value="0">Буквой «Г»</option>
            <option value="1">По кругу</option>
          </select>
        </p>

        <p>
          <input type="button" value="Нарисовать" />
          <input type="button" value="Очистить" />
        </p>
        <label>
          <input type="checkbox" id="animateToggle" />
          Включить анимацию?
        </label>

        <select id="easeType" class="anim-field" style="display: none">
          <option value="linear">linear</option>
          <option value="elastic">elastic</option>
          <option value="bounce">bounce</option>
        </select>
        <br />
        <label>
          <input type="checkbox" id="trajectoryToggle" />
          Перемещиние вдоль пути?
        </label>
        <br />
        <input
          type="button"
          value="Анимировать"
          id="animateBtn"
          style="display: none"
        />
      </form>
      <form id="mashtab">
        <p>
          Масштаб<br />
          по x:
          <input type="number" id="mx" value="1" />
          <span class="anim-field" style="display: none">
            до <input type="number" id="mx2" value="1.5" step="0.1" />
          </span>
          <br />

          по y:
          <input type="number" id="my" value="1" />
          <span class="anim-field" style="display: none">
            до <input type="number" id="my2" value="1.5" step="0.1" />
          </span>
        </p>
      </form>
      <form id="povorot">
        <p>
          Поворот<br />
          угол:
          <input type="number" id="ygol" value="0" />
          <span class="anim-field" style="display: none">
            до <input type="number" id="ygol2" value="180" />
          </span>
        </p>
      </form>
    </div>

    <svg></svg>
  </body>
</html>

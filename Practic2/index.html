<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>dff</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <form id="anim-form">
      <div>
        Скорость (мс): <input type="number" id="duration" value="5000" />
      </div>
      <div>
        Масштаб: <input type="number" id="scaleFactor" value="1.5" step="0.1" />
      </div>
      <div>
        Вращение (гр): <input type="number" id="rotationDeg" value="360" />
      </div>
      <br />
      <button type="button" onclick="startAnimation()">Запустить</button>
      <button type="button" onclick="clearAnimation()">Очистить</button>
    </form>

    <hr />

    <div id="svg-container"></div>
  </body>
</html>
